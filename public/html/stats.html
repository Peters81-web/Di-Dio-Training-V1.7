<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistiche - Di Dio Training</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 28px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-logout {
      background: #ef4444;
      color: #fff;
    }

    .stats-card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.2);
    }

    .stats-card h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 22px;
    }

    .stats-empty-state {
      text-align: center;
      padding: 48px 20px;
      color: rgba(255,255,255,0.85);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <h1><i class="fas fa-chart-line"></i> Statistiche</h1>
      <button id="logoutBtn" class="btn btn-logout">Logout</button>
    </div>

    <div class="stats-card">
      <h2>Andamento cardio</h2>

      <div style="height: 320px;">
        <canvas id="heartRateChart"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/stats-fixed.js"></script>
</body>
</html>
