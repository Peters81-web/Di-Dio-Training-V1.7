<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allenamenti - Riepilogo Settimanale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/weekly-summary-fix.css">
    <link rel="stylesheet" href="/css/enhanced-design.css">
    <link rel="stylesheet" href="/css/mobile-responsive-fix.css">
    <link rel="stylesheet" href="/css/menu-mobile-fix.css">
    <link rel="stylesheet" href="/css/app-nav.css">
    <script src="/js/app-nav.js" defer></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="app-nav">
        <div class="app-nav-inner">
            <a href="/dashboard" class="app-nav-brand">
                <i class="fas fa-calendar-week"></i>
                <span>Riepilogo Settimanale</span>
            </a>
            <button class="app-nav-toggle" id="appNavToggle" aria-controls="appNavMenu" aria-expanded="false" aria-label="Apri menu">
                <span class="app-nav-toggle-line"></span>
                <span class="app-nav-toggle-line"></span>
                <span class="app-nav-toggle-line"></span>
            </button>
            <div class="app-nav-menu" id="appNavMenu">
                <a href="/dashboard" class="app-nav-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
                <a href="/planner" class="app-nav-link"><i class="fas fa-calendar-alt"></i><span>Pianificatore</span></a>
                <a href="/stats" class="app-nav-link"><i class="fas fa-chart-line"></i><span>Statistiche</span></a>
                <button id="logoutBtn" class="app-nav-link app-nav-link--danger"><i class="fas fa-sign-out-alt"></i><span>Esci</span></button>
            </div>
        </div>
    </nav>
    
    <main class="container weekly-summary-container">
        <div class="period-selector-card">
            <div class="period-selectors">
                <div class="selector-group">
                    <label for="year-select">Anno:</label>
                    <select id="year-select" class="form-control">
                        <!-- Opzioni popolate da JavaScript -->
                    </select>
                </div>
                
                <div class="selector-group">
                    <label for="month-select">Mese:</label>
                    <select id="month-select" class="form-control">
                        <option value="0">Gennaio</option>
                        <option value="1">Febbraio</option>
                        <option value="2">Marzo</option>
                        <option value="3">Aprile</option>
                        <option value="4">Maggio</option>
                        <option value="5">Giugno</option>
                        <option value="6">Luglio</option>
                        <option value="7">Agosto</option>
                        <option value="8">Settembre</option>
                        <option value="9">Ottobre</option>
                        <option value="10">Novembre</option>
                        <option value="11">Dicembre</option>
                    </select>
                </div>
                
                <div class="selector-group">
                    <label for="week-select">Settimana:</label>
                    <select id="week-select" class="form-control">
                        <!-- Opzioni popolate da JavaScript -->
                    </select>
                </div>
            </div>
            
            <div id="week-range" class="week-date-badge">
                <!-- Data popolata da JavaScript -->
            </div>
        </div>
        
        <div class="weekly-schedule-card">
            <div id="weekdays-container">
                <!-- I giorni della settimana saranno inseriti qui da JavaScript -->
            </div>
            
            <button id="save-summary-btn" class="btn btn-primary save-btn">
                <i class="fas fa-save"></i> Salva Riepilogo
            </button>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2025 Di Dio Pietro. Tutti i diritti riservati.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/app-core.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/weekly-summary-fix.js"></script>
    <script>
// Fallback per il menu mobile se app-core.js non è caricato
document.addEventListener('DOMContentLoaded', function() {
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const navLinks = document.getElementById('navLinks');
    
    if (mobileMenuToggle && navLinks) {
        mobileMenuToggle.addEventListener('click', function() {
            navLinks.classList.toggle('active');
            
            const icon = this.querySelector('i');
            if (icon) {
                icon.classList.toggle('fa-bars');
                icon.classList.toggle('fa-times');
            }
        });
    }
});
</script>
</body>
</html>
